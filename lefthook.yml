pre-commit:
  # prettier и eslint запускаются последовательно — eslint стартует после prettier
  jobs:
    - name: prettier
      glob: "*.{ts,tsx,js,json}"
      run: node_modules/.bin/prettier --write {staged_files}
      stage_fixed: true

    - name: eslint
      glob: "*.{ts,tsx}"
      run: node_modules/.bin/eslint --fix {staged_files}
      stage_fixed: true

pre-push:
  parallel: true
  jobs:
    - name: typecheck
      run: pnpm turbo run build --filter="[HEAD^1]"

    - name: test
      run: pnpm turbo run test --filter="[HEAD^1]"
